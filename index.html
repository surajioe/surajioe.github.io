<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suraj Poudel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #e8c547;
      --text: #d4d4e8;
      --text-dim: #7070a0;
      --text-bright: #f0f0ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.8;
      font-size: 17px;
      min-height: 100vh;
    }

    header {
      padding: 60px 8vw 40px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--text-bright);
      font-weight: 700;
    }

    header p {
      color: var(--text-dim);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 8vw;
    }

    .section-label {
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 24px;
    }

    .post-card {
      display: block;
      padding: 28px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .post-card:hover {
      border-color: var(--accent);
      background: #14141c;
    }

    .post-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--text-bright);
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .post-card p {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .post-card .tag {
      display: inline-block;
      margin-top: 14px;
      padding: 3px 10px;
      background: #1a1a28;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Suraj Poudel</h1>
    <p>Writing about Python, systems, and software.</p>
  </header>

  <main>
    <div class="section-label">Writing</div>

    <a href="async_python_blog.html" class="post-card">
      <h2>The Anatomy of Concurrent Python — A Deep Dive</h2>
      <p>A thorough exploration of threads, processes, and async I/O in Python — when to use each and why.</p>
      <span class="tag">Python</span>
    </a>
  </main>
</body>
</html>
